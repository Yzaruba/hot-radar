name: reviews

# Review enrichment is fully decoupled from the radar: its own schedule, its
# own concurrency group, and a failure here never touches the radar publish.
on:
  schedule:
    - cron: "43 2 * * *"   # daily, offset from the radar's */6 grid
  workflow_dispatch:

concurrency:
  group: reviews
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Enrich reviews
        env:
          REVIEWS_PROVIDER: ${{ vars.REVIEWS_PROVIDER || 'amazon_page' }}
          REVIEWS_API_KEY: ${{ secrets.REVIEWS_API_KEY }}
        run: python -m scraper.enrich_reviews

      - name: Commit review data if changed
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/reviews site/data/reviews
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "reviews: $(date -u +%FT%TZ)"
          git pull --rebase
          git push
# Published summaries go live with the next radar deploy (≤6h later).
