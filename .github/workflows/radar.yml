name: radar

on:
  schedule:
    - cron: "17 */6 * * *"   # minute offset avoids GitHub's top-of-hour drop window
  workflow_dispatch:

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Scrape and build data
        id: run
        env:
          MYMEMORY_EMAIL: ${{ secrets.MYMEMORY_EMAIL }}
        run: |
          set +e
          python -m scraper.build
          code=$?
          echo "status=$code" >> "$GITHUB_OUTPUT"
          # Only 0 (fresh) and 2 (partial-stale) may proceed to commit+deploy.
          # Anything else (1 = total failure, or a signal death like 137) must
          # not overwrite good data.
          if [ "$code" != "0" ] && [ "$code" != "2" ]; then exit 1; fi
          exit 0

      - name: Commit data if changed
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "data: $(date -u +%FT%TZ)"
          git pull --rebase
          git push

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pick up the data commit pushed by the scrape job

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: d
        uses: actions/deploy-pages@v5

  report:
    needs: [scrape, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Flag partial-stale runs red (after deploy already succeeded)
        run: |
          if [ "${{ needs.scrape.outputs.status }}" != "0" ]; then
            echo "::error::partial failure — some categories or tiktok served stale data"
            exit 1
          fi
          echo "all fresh"
